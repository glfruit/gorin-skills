<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{title}</title>
  <style>
    /* Grace Theme - Elegant cards, shadows */
    :root {
      --theme-primary: #4f46e5;
      --theme-secondary: #818cf8;
      --theme-text: #1f2937;
      --theme-background: #f3f4f6;
      --theme-card-bg: #ffffff;
      --theme-card-border: #e5e7eb;
      --theme-heading-text: #111827;
      --theme-heading-bg: #ffffff;
      --spacing-unit: 8px;
      --font-size-base: 16px;
      --font-size-large: 20px;
      --font-size-small: 14px;
      --border-radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--theme-background);
      color: var(--theme-text);
      line-height: 1.6;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    
    /* Hero Section */
    .hero-section {
      text-align: center;
      padding: 3rem 2rem;
      margin-bottom: 2rem;
    }
    
    .hero-section h1 {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--theme-heading-text);
      margin-bottom: 1rem;
    }
    
    .hero-section .subtitle {
      font-size: 1.25rem;
      color: var(--theme-text);
      font-weight: 500;
    }
    
    .metadata {
      margin-top: 2rem;
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .metadata span {
      padding: 0.5rem 1rem;
      background: var(--theme-primary);
      color: white;
      border-radius: 20px;
      font-size: var(--font-size-small);
    }
    
    /* Learning Objectives / Prerequisites */
    .learning-objectives,
    .prerequisites {
      background: var(--theme-card-bg);
      border-radius: var(--border-radius);
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--theme-card-border);
    }
    
    .learning-objectives h2,
    .prerequisites h2 {
      font-size: 1.5rem;
      color: var(--theme-heading-text);
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--theme-primary);
    }
    
    .learning-objectives li::before,
    .prerequisites li::before {
      content: '✓';
      color: var(--theme-primary);
      font-weight: bold;
      position: absolute;
      left: 0;
    }
    
    /* Modules */
    .modules {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    
    .module {
      background: var(--theme-card-bg);
      border-radius: var(--border-radius);
      padding: 2rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid var(--theme-card-border);
    }
    
    .module:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }
    
    .module h3 {
      font-size: 1.5rem;
      color: var(--theme-heading-text);
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--theme-secondary);
    }
    
    .module p { margin-bottom: 1rem; }
    
    .example {
      background: #f8fafc;
      border-radius: 8px;
      padding: 1.25rem;
      margin: 1.5rem 0;
      border-left: 4px solid var(--theme-primary);
    }
    
    .example h4 {
      font-size: 1.25rem;
      color: var(--theme-heading-text);
      margin-bottom: 1rem;
    }
    
    .example pre,
    .example code {
      background: #0f172a;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 6px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.9rem;
      overflow-x: auto;
      display: block;
    }
    
    .common-mistakes {
      background: #fef2f2;
      border-radius: 8px;
      padding: 1.25rem;
      margin: 1.5rem 0;
      border-left: 4px solid #ef4444;
    }
    
    .common-mistakes h4 {
      font-size: 1.25rem;
      color: #991b1b;
      margin-bottom: 1rem;
    }
    
    .common-mistakes li::before {
      content: '⚠️';
      position: absolute;
      left: 0;
    }
    
    /* Summary / Reference */
    .summary,
    .reference {
      background: var(--theme-card-bg);
      border-radius: var(--border-radius);
      padding: 2rem;
      margin-top: 2rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--theme-card-border);
    }
    
    .summary h2,
    .reference h2 {
      font-size: 1.5rem;
      color: var(--theme-heading-text);
      margin-bottom: 1.5rem;
    }
    
    .summary li::before,
    .reference li::before {
      content: '📌';
      position: absolute;
      left: 0;
    }
    
    /* Workflow Page */
    .workflow-page .visual-overview h2,
    .workflow-page .workflow-steps h2 {
      font-size: 1.5rem;
      color: var(--theme-heading-text);
      margin-bottom: 1.5rem;
    }
    
    .mermaid {
      background: var(--theme-card-bg);
      border-radius: 8px;
      padding: 1.5rem;
      margin-top: 1rem;
      overflow-x: auto;
    }
    
    /*培训页面样式*/
    .training-page .prerequisites li,
    .training-page .learning-objectives li {
      padding: 0.75rem 0;
      padding-left: 2rem;
    }
    
    .training-page .workflow-steps .step {
      background: var(--theme-card-bg);
      border-radius: var(--border-radius);
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
    }
    
    .training-page .workflow-steps .step h3 {
      font-size: 1.4rem;
      color: var(--theme-heading-text);
      margin-bottom: 1rem;
    }
    
    .training-page .faq .qa-pair {
      background: var(--theme-card-bg);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      border-left: 4px solid var(--theme-primary);
    }
    
    .training-page .faq h4,
    .training-page .troubleshooting h4 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }
    
    .training-page .faq p,
    .training-page .troubleshooting p {
      margin-bottom: 0;
    }
    
    /* Training page */
    .training-page .troubleshooting .issue {
      background: #fff1f2;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      border-left: 4px solid #ef4444;
    }
    
    .training-page .troubleshooting ol {
      padding-left: 1.5rem;
      margin-top: 0.75rem;
    }
    
    .training-page .troubleshooting li {
      margin-bottom: 0.5rem;
    }
    
    /* Comparison Table */
    .comparison-table table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1.5rem;
    }
    
    .comparison-table th,
    .comparison-table td {
      padding: 1rem;
      border: 1px solid var(--theme-card-border);
      text-align: left;
    }
    
    .comparison-table th {
      background: var(--theme-primary);
      color: white;
      font-weight: 600;
    }
    
    .comparison-table tr:nth-child(even) {
      background: #f8fafc;
    }
    
    @media (max-width: 768px) {
      .hero-section h1 {
        font-size: 1.8rem;
      }
      .module {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <article class="explainer-page grace-theme">
    <header class="hero-section">
      <h1>{title}</h1>
      <p class="subtitle">{subtitle}</p>
      {metadata_html}
    </header>

    {learning_objectives_html}
    
    {prerequisites_html}
    
    <section class="modules">
      {modules_html}
    </section>

    {summary_html}
    {reference_html}
  </article>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: true });</script>
</body>
</html>
