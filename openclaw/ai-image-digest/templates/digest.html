<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: #0d0d14;
    color: #d4d4dc;
    padding: 0;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    padding: 52px 48px 36px;
    background: linear-gradient(180deg, #14142a 0%, #0d0d14 100%);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 48px; right: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99,102,241,0.3), transparent);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .header h1 {
    font-size: 34px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.5px;
  }
  .header h1 span {
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .date-badge {
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
    background: rgba(99,102,241,0.1);
    padding: 5px 16px;
    border-radius: 20px;
    border: 1px solid rgba(99,102,241,0.2);
    letter-spacing: 0.5px;
  }
  .header .subtitle {
    font-size: 14px;
    color: #64748b;
    margin-top: 8px;
    letter-spacing: 0.3px;
  }

  /* ── Sections ── */
  .section {
    padding: 32px 48px 0;
  }
  .section + .section {
    border-top: 1px solid rgba(255,255,255,0.03);
    padding-top: 36px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .section-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .section-icon.podcast { background: rgba(168,85,247,0.15); color: #c084fc; }
  .section-icon.twitter { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .section-icon.blog { background: rgba(16,185,129,0.15); color: #34d399; }
  .section-icon.chinese { background: rgba(251,146,60,0.15); color: #fbbf24; }
  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .section-count {
    font-size: 12px;
    color: #475569;
    margin-left: auto;
    font-weight: 500;
  }

  /* ── Items ── */
  .items {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 28px;
  }
  .item {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 14px 18px;
    transition: background 0.15s ease;
    position: relative;
  }
  .item:hover {
    background: rgba(255,255,255,0.045);
  }
  /* Section color left borders */
  .item.podcast-item { border-left: 3px solid rgba(168,85,247,0.45); }
  .item.twitter-item { border-left: 3px solid rgba(59,130,246,0.45); }
  .item.blog-item { border-left: 3px solid rgba(16,185,129,0.45); }
  .item.chinese-item { border-left: 3px solid rgba(251,146,60,0.45); }

  /* ── Item meta row ── */
  .item-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .item-num {
    font-size: 11px;
    font-weight: 700;
    color: #475569;
    min-width: 18px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .item-avatar {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0;
  }
  .item-avatar.podcast { background: linear-gradient(135deg, #a855f7, #7c3aed); }
  .item-avatar.twitter { background: linear-gradient(135deg, #3b82f6, #2563eb); }
  .item-avatar.blog { background: linear-gradient(135deg, #10b981, #059669); }
  .item-avatar.chinese { background: linear-gradient(135deg, #fb923c, #ea580c); }
  .item-name {
    font-size: 13px;
    font-weight: 600;
    color: #e2e8f0;
  }
  .item-handle {
    font-size: 12px;
    color: #64748b;
    font-weight: 400;
  }
  .item-time {
    font-size: 11px;
    color: #475569;
  }
  .item-stats {
    font-size: 11px;
    color: #f472b6;
    margin-left: auto;
    font-weight: 500;
  }
  .item-stats.podcast-stats { color: #c084fc; }
  .item-stats.blog-stats { color: #34d399; }
  .item-stats.chinese-stats { color: #fbbf24; }

  /* ── Item content ── */
  .item-content {
    font-size: 13.5px;
    line-height: 1.7;
    color: #a1a1b0;
    padding-left: 48px;
  }
  .item-content strong { color: #e2e8f0; font-weight: 600; }

  /* ── Item source link ── */
  .item-link {
    padding-left: 48px;
    margin-top: 6px;
  }
  .item-link a {
    font-size: 11px;
    color: #475569;
    text-decoration: none;
    word-break: break-all;
  }
  .item-link a:hover { color: #6366f1; }

  /* ── Footer ── */
  .footer {
    padding: 28px 48px 40px;
    margin-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-left { font-size: 11px; color: #475569; }
  .footer-left span { color: #64748b; }
  .footer-right { font-size: 11px; color: #475569; text-align: right; }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <h1>AI <span>Builder</span> Daily</h1>
    <div class="date-badge">{{DATE}}</div>
  </div>
  <div class="subtitle">追踪 AI 行业最前沿的 builder、研究者和产品</div>
</div>

{{PODCAST_SECTION}}
{{TWITTER_SECTION}}
{{BLOG_SECTION}}
{{CHINESE_SECTION}}

<div class="footer">
  <div class="footer-left">数据来源: <span>follow-builders (25 builders · 5 podcasts · 2 blogs) + 中文媒体</span></div>
  <div class="footer-right">{{STATS}}</div>
</div>
</body>
</html>
